{% extends "base.html" %}
{% block content %}
<h2>Chat: {{ room }}</h2>
<div id="messages" class="border p-3 mb-3" style="height:400px;overflow-y:scroll;">
{% for msg in messages %}
<p><strong>{{ msg.username }}:</strong> {{ msg.message }} <small>{{ msg.timestamp }}</small></p>
{% endfor %}
</div>
<input id="message" class="form-control" placeholder="Type message...">
<button onclick="sendMessage()" class="btn btn-primary mt-2">Send</button>
<a href="/chat" class="btn btn-secondary mt-2">Leave</a>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script>
var socket = io();
socket.on('connect', () => socket.emit('join'));
socket.on('message', data => {
  var messages = document.getElementById('messages');
  messages.innerHTML += '<p><strong>' + data.msg + '</strong></p>';
  messages.scrollTop = messages.scrollHeight;
});
socket.on('status', data => {
  document.getElementById('messages').innerHTML += '<p class="text-muted">' + data.msg + '</p>';
});
function sendMessage() {
  var msg = document.getElementById('message').value;
  socket.emit('message', {message: msg});
  document.getElementById('message').value = '';
}
</script>
{% endblock %}
